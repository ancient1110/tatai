<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>塔台工程</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #f0f2f5;
            display: flex;
            user-select: none;
            overscroll-behavior: none;
            touch-action: none;
        }
        
        #canvas-container {
            flex-grow: 1; height: 100vh; position: relative;
            background: radial-gradient(circle at center, #ffffff 0%, #eef2f3 100%);
            cursor: crosshair;
        }

        /* ===== 画布触摸控制：彻底禁止浏览器拦截手势 ===== */
        #simCanvas {
            /* 彻底禁止浏览器拦截画布上的任何默认手势（包括双指缩放、双击放大、页面滑动） */
            touch-action: none; 
            /* 禁用 iOS 系统的长按弹出菜单/文本选中 */
            -webkit-touch-callout: none; 
            -webkit-user-select: none;
        }

        #sidebar {
            width: 360px; height: 100vh; background: #fff;
            border-left: 1px solid #dcdcdc; display: flex; flex-direction: column;
            box-shadow: -5px 0 15px rgba(0,0,0,0.05); z-index: 100;
        }

        .sidebar-scroll { padding: 20px; overflow-y: auto; flex-grow: 1; }

        h2 { font-size: 16px; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 8px; margin: 20px 0 10px 0; display: flex; justify-content: space-between; align-items: center; }
        h2:first-child { margin-top: 0; }
        
        .mode-btn {
            width: 100%; padding: 15px; border: none; border-radius: 8px;
            font-size: 18px; font-weight: bold; cursor: pointer; color: white;
            transition: all 0.3s; margin-bottom: 20px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
        }
        .mode-btn.testing {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
        }
        .mode-btn:active { transform: scale(0.98); }

        .material-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .mat-option {
            flex: 1; padding: 10px 5px; border: 2px solid #ecf0f1; border-radius: 6px;
            text-align: center; cursor: pointer; transition: all 0.2s; font-size: 12px;
            background: #f9f9f9;
        }
        .mat-option:hover { border-color: #bdc3c7; }
        .mat-option.active { border-color: #3498db; background: #ebf5fb; color: #2980b9; font-weight: bold; }
        .mat-color { width: 12px; height: 12px; border-radius: 50%; margin: 0 auto 5px; }

        .slider-group { margin-bottom: 15px; background: #f8f9fa; padding: 10px; border-radius: 6px; }
        .slider-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; color: #555; }
        input[type=range] {
            width: 100%; cursor: pointer;
            touch-action: pan-x;
        }
        
        .stat-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; color: #555; }
        .total-cost { font-size: 24px; color: #e67e22; font-weight: bold; text-align: right; margin-top: 10px; }
        
        #toast {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(44, 62, 80, 0.85); color: white; padding: 8px 20px;
            border-radius: 30px; opacity: 0; transition: opacity 0.5s; pointer-events: none;
        }
        
        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        .btn-small {
            background: #ecf0f1; border: none; padding: 8px 0; border-radius: 4px;
            cursor: pointer; color: #7f8c8d; font-size: 12px; flex: 1;
        }
        .btn-small:hover { background: #ffeaa7; color: #d35400; }
        .btn-small.danger { background: #fde6e6; color: #c0392b; }
        .btn-small.danger:hover { background: #f5b7b1; }

        #delete-mode-toggle {
            background: #ecf0f1; border: 2px solid #bdc3c7; border-radius: 4px;
            padding: 8px; text-align: center; cursor: pointer; font-size: 12px; margin-top: 10px;
        }
        #delete-mode-toggle.active {
            background: #e74c3c; border-color: #c0392b; color: white;
        }

        .btn-special {
            background: #3498db; color: white; width: 100%; padding: 10px;
            border: none; border-radius: 4px; margin-top: 15px; cursor: pointer;
            font-size: 14px;
        }
        .btn-special:hover { background: #2980b9; }

        .btn-export {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white; width: 100%; padding: 10px;
            border: none; border-radius: 4px; margin-top: 10px; cursor: pointer;
            font-size: 14px; font-weight: bold;
            box-shadow: 0 3px 8px rgba(46,204,113,0.3);
            transition: all 0.2s;
        }
        .btn-export:hover { background: linear-gradient(135deg, #219a52, #27ae60); transform: translateY(-1px); }
        .btn-export:active { transform: scale(0.98); }

        #bottom-left-panel {
            position: absolute; left: 16px; bottom: 16px; z-index: 50;
            background: rgba(255,255,255,0.93); border: 1px solid #dcdcdc;
            border-radius: 10px; padding: 14px 16px; min-width: 165px; max-width: 195px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.12);
            backdrop-filter: blur(4px);
        }
        #bottom-left-panel h3 {
            margin: 0 0 10px 0; font-size: 13px; color: #2c3e50;
            border-bottom: 2px solid #3498db; padding-bottom: 6px;
        }
        #bottom-left-panel .stat-row { font-size: 12px; margin-bottom: 5px; }
        #bottom-left-panel .total-cost { font-size: 20px; margin-top: 8px; }
        #bottom-left-panel .btn-small { font-size: 11px; padding: 6px 0; }
        #bottom-left-panel #delete-mode-toggle { font-size: 11px; padding: 6px; }
        #bottom-left-panel .btn-special { font-size: 12px; padding: 8px; margin-top: 10px; }

        #height-display {
            position: absolute; left: 16px; top: 16px; z-index: 50;
            background: rgba(44,62,80,0.82); color: #fff;
            border-radius: 10px; padding: 10px 18px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        #height-display .label { font-size: 12px; opacity: 0.75; margin-bottom: 2px; }
        #height-display .value { font-size: 36px; font-weight: bold; line-height: 1; color: #2ecc71; }
        #height-display .unit  { font-size: 14px; opacity: 0.8; margin-left: 2px; }

        /* ===== 移动端响应式 ===== */
        #mobile-sidebar-toggle {
            display: none;
            position: absolute; bottom: 16px; right: 16px; z-index: 200;
            width: 48px; height: 48px; border-radius: 50%;
            background: #3498db; color: white; border: none;
            font-size: 22px; cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,0.25);
            align-items: center; justify-content: center;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: hidden; }

            #canvas-container {
                height: 56vw;
                min-height: 240px;
                max-height: 58vh;
                flex-grow: 0;
            }

            #sidebar {
                width: 100%;
                height: auto;
                border-left: none;
                border-top: 1px solid #dcdcdc;
                box-shadow: 0 -3px 10px rgba(0,0,0,0.06);
                overflow: hidden;
                transition: max-height 0.3s ease;
                max-height: 500px;
            }
            #sidebar.collapsed { max-height: 0; border-top: none; }

            .sidebar-scroll { max-height: 42vh; }

            #mobile-sidebar-toggle { display: flex; }

            #height-display .value { font-size: 28px; }

            #bottom-left-panel { padding: 10px 12px; min-width: 140px; }
            #bottom-left-panel .total-cost { font-size: 17px; }
        }

        @media (max-width: 480px) {
            #canvas-container { min-height: 200px; max-height: 50vh; }
            .sidebar-scroll { max-height: 48vh; }
            .mat-option { padding: 8px 3px; font-size: 11px; }
            .mode-btn { font-size: 15px; padding: 13px; }
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="simCanvas"></canvas>
        <div id="toast">提示信息</div>

        <div id="height-display">
            <div class="label">🏗️ 当前塔高</div>
            <div><span class="value" id="hd-value">0</span><span class="unit">m</span></div>
        </div>

        <button id="mobile-sidebar-toggle" onclick="toggleMobileSidebar()" title="展开/折叠面板">☰</button>

        <div id="bottom-left-panel">
            <h3>📊 工程造价单</h3>
            <div class="stat-row" style="display:flex;justify-content:space-between;gap:8px;">
                <span style="white-space:nowrap;">地基 <span id="stat-nodes-pinned">0</span> × ¥500</span>
                <span style="color:#e67e22;font-weight:bold;">¥<span id="stat-cost-nodes-pinned">0</span></span>
            </div>
            <div class="stat-row" style="display:flex;justify-content:space-between;gap:8px;">
                <span style="white-space:nowrap;">木节点 <span id="stat-nodes-wood">0</span> × ¥20</span>
                <span style="color:#8e44ad;font-weight:bold;">¥<span id="stat-cost-nodes-wood">0</span></span>
            </div>
            <div class="stat-row" style="display:flex;justify-content:space-between;gap:8px;">
                <span style="white-space:nowrap;">钢节点 <span id="stat-nodes-steel">0</span> × ¥60</span>
                <span style="color:#2c3e50;font-weight:bold;">¥<span id="stat-cost-nodes-steel">0</span></span>
            </div>
            <div class="stat-row" style="display:flex;justify-content:space-between;gap:8px;">
                <span style="white-space:nowrap;">碳节点 <span id="stat-nodes-carbon">0</span> × ¥160</span>
                <span style="color:#2980b9;font-weight:bold;">¥<span id="stat-cost-nodes-carbon">0</span></span>
            </div>
            <div class="stat-row" style="display:flex;justify-content:space-between;gap:8px;">
                <span style="white-space:nowrap;">木条 <span id="stat-len-wood">0</span>m × ¥40</span>
                <span style="color:#8e44ad;font-weight:bold;">¥<span id="stat-cost-wood">0</span></span>
            </div>
            <div class="stat-row" style="display:flex;justify-content:space-between;gap:8px;">
                <span style="white-space:nowrap;">钢材 <span id="stat-len-steel">0</span>m × ¥160</span>
                <span style="color:#2c3e50;font-weight:bold;">¥<span id="stat-cost-steel">0</span></span>
            </div>
            <div class="stat-row" style="display:flex;justify-content:space-between;gap:8px;">
                <span style="white-space:nowrap;">碳纤 <span id="stat-len-carbon">0</span>m × ¥400</span>
                <span style="color:#2980b9;font-weight:bold;">¥<span id="stat-cost-carbon">0</span></span>
            </div>
            <div style="border-top:1px dashed #ccc;margin:8px 0;"></div>
            <div style="display:flex;justify-content:space-between;align-items:baseline;">
                <span style="font-size:12px;color:#888;">总计</span>
                <div class="total-cost" style="margin-top:0;">¥<span id="stat-cost">0</span></div>
            </div>
            <div id="cost-eval" style="margin-top:10px;font-size:12px;line-height:1.6;padding:8px 10px;border-radius:6px;background:#f0f8ff;color:#555;border-left:3px solid #3498db;display:none;"></div>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-scroll">
            <button id="btn-mode" class="mode-btn" onclick="toggleSimulation()">▶️ 开始测试</button>

            <h2>🏗️ 材料选择</h2>
            <div class="material-group">
                <div class="mat-option active" onclick="setMaterial('wood')" id="mat-wood">
                    <div class="mat-color" style="background:#8e44ad"></div>
                    <div>普通木条<br>¥40/m<br><span style="font-size:10px;color:#999;">节点¥20</span></div>
                </div>
                <div class="mat-option" onclick="setMaterial('steel')" id="mat-steel">
                    <div class="mat-color" style="background:#2c3e50"></div>
                    <div>加强钢材<br>¥160/m<br><span style="font-size:10px;color:#999;">节点¥60</span></div>
                </div>
                <div class="mat-option" onclick="setMaterial('carbon')" id="mat-carbon">
                    <div class="mat-color" style="background:#2980b9"></div>
                    <div>碳纤维<br>¥400/m<br><span style="font-size:10px;color:#999;">节点¥160</span></div>
                </div>
            </div>

            <h2>🎛️ 环境测试台</h2>
            <div class="slider-group">
                <div class="slider-label"><span>💨 风力等级</span> <span id="val-wind">0级</span></div>
                <input type="range" min="0" max="100" step="0.1" value="0" oninput="updateEnv('wind', this.value)" disabled id="slider-wind">
            </div>
            <div class="slider-group">
                <div class="slider-label"><span>🌋 地震强度</span> <span id="val-quake">0级</span></div>
                <input type="range" min="0" max="100" step="0.1" value="0" oninput="updateEnv('quake', this.value)" disabled id="slider-quake">
            </div>
            <div class="slider-group">
                <div class="slider-label"><span>⚖️ 顶部压重</span> <span id="val-load">0kg</span></div>
                <input type="range" min="0" max="100" step="0.1" value="0" oninput="updateEnv('load', this.value)" disabled id="slider-load">
            </div>

            <button id="btn-apply-test" class="btn-special" onclick="applyTest()" disabled
                style="background:linear-gradient(135deg,#e67e22,#d35400);margin-top:8px;font-size:15px;font-weight:bold;letter-spacing:1px;">
                ⚡ 应用测试 <span id="apply-countdown"></span>
            </button>

            <div style="display: flex; gap: 8px; margin: 20px 0 10px;">
                <button class="btn-small" onclick="undo()">↩️ 撤销</button>
                <button class="btn-small danger" onclick="clearAll()">🗑️ 全部清空</button>
            </div>
            <div id="delete-mode-toggle" onclick="toggleDeleteMode()">✂️ 删除模式 (关闭)</div>
            <button class="btn-export" onclick="exportCanvasImage()">📷 导出搭建图片</button>

        </div>
    </div>

<script>
    (function() {
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        const MATERIALS = {
            wood:   { id: 'wood',   name: '木条', color: '#8e44ad', cost: 40,  strength: 8.5,  nodeStrength: 6.5,  density: 0.005, stiffness: 0.72, angleStrength: 0.11, nodeCost: 20  },
            steel:  { id: 'steel',  name: '钢材', color: '#2c3e50', cost: 160, strength: 24,   nodeStrength: 30,   density: 0.015, stiffness: 0.86, angleStrength: 0.19, nodeCost: 60  },
            carbon: { id: 'carbon', name: '碳纤', color: '#2980b9', cost: 400, strength: 52,   nodeStrength: 62,   density: 0.0042, stiffness: 0.93, angleStrength: 0.28, nodeCost: 160 }
        };

        const CONFIG = { gravity: 0.5, groundHeight: 60, snapDist: 15, maxStickLen: 120, scale: 50, nodeBaseCost: 100, angleStiffness: 0.1, stressSmoothing: 0.74, isolationPenalty: 1.5, redundancyBonusPerLink: 0.12, maxRedundancyBonus: 1.55, bucklingFactor: 1.15, testSeverityMultiplier: 5 };

        let width, height, groundY;
        let points = [], sticks = [], debrisList = [], welds = [];                 
        let isSimulating = false, currentMat = 'wood', blueprint = null;                
        let env = { wind: 0, quake: 0, load: 0 };
        let mouse = { x: 0, y: 0 }, dragStart = null, isDragging = false;
        let hoveredPoint = null, hoveredStick = null, hoveredWeldPos = null;              
        let preheatRemaining = 0, angleConstraints = [];

        let nextBreakOrder = 1;                
        const MAX_BREAKS_TO_HIGHLIGHT = 3;      
        let historyStack = [], deleteMode = false;
        const MAX_HISTORY = 20;
        let envActive = false;
        let envRampUp = 0;        // 0~1，力的渐入系数
        const ENV_RAMP_FRAMES = 40; // 渐入帧数（约0.67秒）
        let showBreakMarkers = false; 

        function getWindForceAtY(y) {
            if (!isSimulating || !envActive || env.wind <= 0) return 0;
            const amplitude = (groundY - y) / 780 * (env.wind / 0.44) * 1.3;
            return Math.sin(Date.now() / 350) * amplitude * envRampUp;
        }

        function getQuakeOffsets() {
            if (!isSimulating || !envActive || env.quake <= 0) return { x: 0, y: 0 };
            const t = Date.now();
            return { x: Math.sin(t / 50) * (env.quake / 4.2) * 1.3, y: Math.cos(t / 65) * (env.quake / 6.2) * 1.3 };
        }

        class Debris {
            constructor(x1, y1, x2, y2, color, isNode = false) {
                this.cx = (x1 + x2) / 2; this.cy = (y1 + y2) / 2;
                this.length = isNode ? 6 : Math.hypot(x2 - x1, y2 - y1);
                this.angle = Math.atan2(y2 - y1, x2 - x1);
                this.color = color; this.isNode = isNode;
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 1) * 10;
                this.va = (Math.random() - 0.5) * 1.5; 
                this.life = 1.0;
            }
            update() {
                this.vy += 0.4; 
                this.cx += this.vx; this.cy += this.vy;
                this.angle += this.va;
                this.life -= 0.015;
                if (this.cy > groundY) {
                    this.cy = groundY; this.vy *= -0.4; this.vx *= 0.6; this.va *= 0.8;
                }
            }
            draw() {
                if (this.life <= 0) return;
                ctx.save(); ctx.translate(this.cx, this.cy); ctx.rotate(this.angle); ctx.globalAlpha = Math.max(0, this.life);
                if (this.isNode) {
                    ctx.beginPath(); ctx.arc(0, 0, this.length, 0, Math.PI*2); ctx.fillStyle = this.color; ctx.fill();
                } else {
                    ctx.beginPath(); ctx.moveTo(-this.length / 2, 0); ctx.lineTo(this.length / 2, 0);
                    ctx.strokeStyle = this.color; ctx.lineWidth = 4; ctx.stroke();
                }
                ctx.restore();
            }
        }

        class Point {
            constructor(x, y, pinned, matId) {
                this.x = x; this.y = y; this.oldx = x; this.oldy = y;
                this.pinned = pinned; this.mat = MATERIALS[matId]; this.baseX = x;
                this.broken = false; this.wasBroken = false; this.breakOrder = 0;            
                this.baseMass = 0.2; 
                this.mass = this.baseMass; 
                this.isGhost = false;
                this.isWeld = false; // 标记是否为焊接点
                if (pinned) { this.mat = Object.assign({}, this.mat, { nodeStrength: Infinity, angleStrength: Infinity }); }
            }

            shatter() {
                if (this.broken || !isSimulating) return;
                
                this.broken = true; this.wasBroken = true; this.breakOrder = nextBreakOrder++;
                debrisList.push(new Debris(this.x, this.y, this.x, this.y, this.mat.color, true));

                sticks.forEach(s => {
                    if (s.broken) return;
                    if (s.p1 === this) {
                        let ghost = new Point(this.x, this.y, false, this.mat.id);
                        ghost.oldx = this.oldx; ghost.oldy = this.oldy; ghost.mass = this.mass / 2; ghost.isGhost = true;
                        points.push(ghost); s.p1 = ghost;
                    } else if (s.p2 === this) {
                        let ghost = new Point(this.x, this.y, false, this.mat.id);
                        ghost.oldx = this.oldx; ghost.oldy = this.oldy; ghost.mass = this.mass / 2; ghost.isGhost = true;
                        points.push(ghost); s.p2 = ghost;
                    }
                });
            }

            applyForces() {
                if (this.broken) return; 
                if (!isSimulating) { this.oldx = this.x; this.oldy = this.y; return; }
                if (this.pinned) return;

                let vx = (this.x - this.oldx) * 0.9, vy = (this.y - this.oldy) * 0.9;
                this.oldx = this.x; this.oldy = this.y;
                
                this.y += CONFIG.gravity; 
                
                if (envActive && groundY - this.y > 100) {
                    this.y += env.load * 1.24 * envRampUp;
                } 
                
                let windForce = getWindForceAtY(this.y);
                this.x += (windForce * 0.3) / this.mass; 
                
                this.x += vx; this.y += vy;
                
                if (envActive && isSimulating && env.quake > 0 && !this.pinned) {
                    this.x += (Math.random() - 0.5) * (env.quake / 0.72) * 1.3 * envRampUp;
                    this.y += (Math.random() - 0.5) * (env.quake / 1.05) * 1.3 * envRampUp;
                }
            }

            applyConstraints() {
                if (this.broken) return;
                if (this.pinned) {
                    const quake = getQuakeOffsets();
                    if (env.quake > 0) { this.x = this.baseX + quake.x; this.y = groundY + quake.y; } 
                    else { this.x += (this.baseX - this.x) * 0.1; this.y = groundY; }
                    this.oldx = this.x; this.oldy = this.y;
                } else {
                    if (this.y > groundY) { let vy = this.y - this.oldy; this.y = groundY; this.oldy = this.y + vy * 0.15; }
                }
            }
        }

        class Stick {
            constructor(p1, p2, matId) {
                this.p1 = p1; this.p2 = p2; this.mat = MATERIALS[matId];
                this.len = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                this.frameStress = 0; 
                this.stress = 0; 
                this.broken = false; this.wasBroken = false; this.breakOrder = 0;             
                this.stiffness = this.mat.stiffness; 
                this.lastStrain = 0;
                this.lastCompressionRatio = 0;
            }

            shatter() {
                if (this.broken || !isSimulating) return;
                this.broken = true; this.wasBroken = true; this.breakOrder = nextBreakOrder++;

                let fragments = 2 + Math.floor(Math.random() * 3); 
                let dx = this.p2.x - this.p1.x, dy = this.p2.y - this.p1.y;
                for (let i = 0; i < fragments; i++) {
                    let f1 = i / fragments, f2 = (i + 1) / fragments;
                    let x1 = this.p1.x + dx * f1, y1 = this.p1.y + dy * f1;
                    let x2 = this.p1.x + dx * f2, y2 = this.p1.y + dy * f2;
                    debrisList.push(new Debris(x1, y1, x2, y2, this.mat.color, false));
                }
            }

            resolve() {
                if (this.broken || !isSimulating) { if (!isSimulating) this.len = Math.hypot(this.p1.x - this.p2.x, this.p1.y - this.p2.y); return; }
                let dx = this.p2.x - this.p1.x, dy = this.p2.y - this.p1.y, dist = Math.hypot(dx, dy);
                if (dist === 0) return;

                let diff = this.len - dist; 
                let strain = Math.abs(diff) / Math.max(this.len, 1);
                let compressionRatio = Math.max(0, diff) / Math.max(this.len, 1);
                this.lastStrain = strain;
                this.lastCompressionRatio = compressionRatio;
                let slenderness = Math.min(2.2, this.len / 65);
                let bucklingStress = compressionRatio * slenderness * CONFIG.bucklingFactor;
                this.frameStress += strain * (1 + bucklingStress);
                
                let percent = (diff / dist) * 0.5 * this.stiffness;
                let ox = dx * percent, oy = dy * percent;

                let totalMass = this.p1.mass + this.p2.mass;
                let m1Ratio = this.p2.mass / totalMass, m2Ratio = this.p1.mass / totalMass;

                let move1 = !this.p1.pinned && !this.p1.broken;
                let move2 = !this.p2.pinned && !this.p2.broken;

                if (move1 && move2) {
                    this.p1.x -= ox * 2 * m1Ratio; this.p1.y -= oy * 2 * m1Ratio;
                    this.p2.x += ox * 2 * m2Ratio; this.p2.y += oy * 2 * m2Ratio;
                } else if (move1) {
                    this.p1.x -= ox * 2; this.p1.y -= oy * 2;
                } else if (move2) {
                    this.p2.x += ox * 2; this.p2.y += oy * 2;
                }
            }

            checkBreakage() {
                if (this.broken || !isSimulating || preheatRemaining > 0) return;

                const deg1 = getPointConnectivity(this.p1);
                const deg2 = getPointConnectivity(this.p2);
                const extraLinks = Math.max(0, deg1 + deg2 - 2);
                const redundancyBonus = Math.min(CONFIG.maxRedundancyBonus, 1 + extraLinks * CONFIG.redundancyBonusPerLink);
                const isolationPenalty = (Math.min(deg1, deg2) <= 1) ? CONFIG.isolationPenalty : 1;
                const visualDeformPenalty = 1 + Math.min(1.35, this.lastStrain * 4.8);
                const compressionPenalty = 1 + Math.min(0.72, this.lastCompressionRatio * 6.2);
                const effectiveStress = this.stress * isolationPenalty * visualDeformPenalty * compressionPenalty * CONFIG.testSeverityMultiplier / redundancyBonus;

                // 杆件强度：焊接点仅提供极轻微补偿，优先保证“明显形变就会断”的视觉反馈
                let stickStrength = this.mat.strength;
                if (this.p1.isWeld || this.p2.isWeld) stickStrength *= 1.08;

                if (effectiveStress > stickStrength) {
                    this.shatter(); 
                    return; 
                }

                // 节点强度：焊点加成同步收紧，避免节点“神奇抗断”
                let ns1 = this.p1.isWeld ? this.p1.mat.nodeStrength * 1.16 : this.p1.mat.nodeStrength;
                let ns2 = this.p2.isWeld ? this.p2.mat.nodeStrength * 1.16 : this.p2.mat.nodeStrength;

                let jointStress = effectiveStress;
                if (jointStress > Math.min(ns1, ns2)) {
                    if (ns1 < jointStress && !this.p1.pinned && !this.p1.broken && !this.p1.isGhost) this.p1.shatter();
                    if (ns2 < jointStress && !this.p2.pinned && !this.p2.broken && !this.p2.isGhost) this.p2.shatter();
                }
            }

            draw() {
                if (isSimulating && this.broken) return;

                if (showBreakMarkers && this.wasBroken && this.breakOrder > 0 && this.breakOrder <= MAX_BREAKS_TO_HIGHLIGHT) {
                    ctx.beginPath(); ctx.moveTo(this.p1.x, this.p1.y); ctx.lineTo(this.p2.x, this.p2.y);
                    ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 8; ctx.setLineDash([8,4]); ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.beginPath(); ctx.moveTo(this.p1.x, this.p1.y); ctx.lineTo(this.p2.x, this.p2.y);
                    ctx.strokeStyle = this.mat.color; ctx.lineWidth = 4; ctx.stroke();
                    return;
                }

                if (!isSimulating && this.broken) {
                    ctx.beginPath(); ctx.moveTo(this.p1.x, this.p1.y); ctx.lineTo(this.p2.x, this.p2.y);
                    ctx.strokeStyle = this.mat.color; ctx.lineWidth = 2; ctx.setLineDash([2,4]); ctx.stroke();
                    ctx.setLineDash([]);
                    return;
                }

                ctx.beginPath();
                let color = this.mat.color;
                if (isSimulating) {
                    let ratio = Math.min(this.stress / (this.mat.strength * 0.6), 1);
                    if (ratio > 0.4) ctx.strokeStyle = `rgb(255, ${Math.max(0, 200 - ratio*200)}, 0)`;
                    else ctx.strokeStyle = color;
                } else ctx.strokeStyle = color;
                
                ctx.lineWidth = 4; ctx.lineCap = 'round';
                ctx.moveTo(this.p1.x, this.p1.y); ctx.lineTo(this.p2.x, this.p2.y); ctx.stroke();
            }
        }

        // 焊接点约束
        class WeldConstraint {
            constructor(point, stick, t) {
                this.point = point;
                this.point.isWeld = true; // 标记这是个焊接点
                this.stick = stick;
                this.t = t;
            }
            resolve() {
                if (this.stick.broken || this.point.broken) return;

                let A = this.stick.p1;
                let B = this.stick.p2;
                let W = this.point;

                let Ix = A.x + this.t * (B.x - A.x);
                let Iy = A.y + this.t * (B.y - A.y);

                let Ex = Ix - W.x;
                let Ey = Iy - W.y;

                let wW = W.pinned ? 0 : 1 / W.mass;
                let wA = A.pinned ? 0 : 1 / A.mass;
                let wB = B.pinned ? 0 : 1 / B.mass;

                let sumInvMass = wW + wA * (1 - this.t) * (1 - this.t) + wB * this.t * this.t;
                if (sumInvMass === 0) return;

                // 核心修复：将 0.9 调为 1.0 (完全刚性)，消灭迭代中产生的"打架微震"导致的不合理节点掉落
                let stiffness = 0.95; 
                let cx = (Ex / sumInvMass) * stiffness;
                let cy = (Ey / sumInvMass) * stiffness;

                if (!W.pinned) { W.x += cx * wW; W.y += cy * wW; }
                if (!A.pinned) { A.x -= cx * wA * (1 - this.t); A.y -= cy * wA * (1 - this.t); }
                if (!B.pinned) { B.x -= cx * wB * this.t; B.y -= cy * wB * this.t; }

                let dx = B.x - A.x;
                let dy = B.y - A.y;
                let L = Math.hypot(dx, dy);
                if (L > 0.001) {
                    let nx = -dy / L;
                    let ny = dx / L;
                    let latError = Math.abs(Ex * nx + Ey * ny);
                    // 核心修复：下调侧边受力乘数至 0.15。保留了“弯矩能把棍子折断”的真实规律，但也给予了合理宽容度
                    // latError 对原杆件无实际效果，归零避免噪声 (latError * 0) 
                }
            }
        }

        function init() {
            resize(); window.addEventListener('resize', resize);
            addPoint(width/2 - 60, groundY, true, 'wood'); addPoint(width/2 + 60, groundY, true, 'wood');
            saveHistory(); loop();
        }

        function resize() {
            width = container.clientWidth; height = container.clientHeight;
            canvas.width = width; canvas.height = height;
            groundY = height - CONFIG.groundHeight;
            points.forEach(p => { if(p.pinned) p.y = groundY; });
        }

        function addPoint(x, y, pinned, matId) { let p = new Point(x, y, pinned, matId); points.push(p); return p; }

        function getPointConnectivity(point) {
            let count = 0;
            for (let s of sticks) {
                if (s.broken) continue;
                if (s.p1 === point || s.p2 === point) count++;
            }
            return count;
        }

        function saveHistory() {
            let snapshot = {
                points: points.map(p => ({ x: p.x, y: p.y, pinned: p.pinned, matId: p.mat.id, broken: p.broken, wasBroken: p.wasBroken, breakOrder: p.breakOrder })),
                sticks: sticks.map(s => ({ p1Idx: points.indexOf(s.p1), p2Idx: points.indexOf(s.p2), matId: s.mat.id, broken: s.broken, wasBroken: s.wasBroken, breakOrder: s.breakOrder, len: s.len })),
                welds: welds.map(w => ({ pIdx: points.indexOf(w.point), sIdx: sticks.indexOf(w.stick), t: w.t }))
            };
            historyStack.push(snapshot); if (historyStack.length > MAX_HISTORY) historyStack.shift();
        }

        function restoreFromHistory(snapshot) {
            points = snapshot.points.map(p => { let pt = new Point(p.x, p.y, p.pinned, p.matId); pt.broken = p.broken; pt.wasBroken = p.wasBroken; pt.breakOrder = p.breakOrder; return pt; });
            sticks = snapshot.sticks.map(s => { let p1 = points[s.p1Idx], p2 = points[s.p2Idx]; let st = new Stick(p1, p2, s.matId); st.broken = s.broken; st.wasBroken = s.wasBroken; st.breakOrder = s.breakOrder; st.len = s.len || Math.hypot(p1.x - p2.x, p1.y - p2.y); return st; });
            welds = snapshot.welds.map(w => new WeldConstraint(points[w.pIdx], sticks[w.sIdx], w.t));
            angleConstraints = []; debrisList = []; 
        }

        function undo() {
            if (isSimulating) { showToast("测试中不能撤销"); return; }
            if (historyStack.length <= 1) { showToast("没有更多步骤"); return; }
            historyStack.pop(); restoreFromHistory(historyStack[historyStack.length-1]); showToast("撤销成功");
        }

        function toggleDeleteMode() {
            if (isSimulating) { showToast("测试中不能删除"); return; }
            deleteMode = !deleteMode;
            document.getElementById('delete-mode-toggle').innerText = deleteMode ? '✂️ 删除模式 (开启)' : '✂️ 删除模式 (关闭)';
            document.getElementById('delete-mode-toggle').classList.toggle('active', deleteMode);
        }

        function cleanupOrphans() {
            let toRemove = [];
            for (let p of points) {
                if (!sticks.some(s => s.p1 === p || s.p2 === p)) {
                    toRemove.push(p);
                }
            }
            toRemove.forEach(p => {
                let idx = points.indexOf(p);
                if (idx !== -1) points.splice(idx, 1);
            });
            welds = welds.filter(w => points.includes(w.point) && sticks.includes(w.stick));
        }

        function deletePoint(point) {
            let idx = points.indexOf(point); if (idx === -1) return;
            sticks = sticks.filter(s => s.p1 !== point && s.p2 !== point); 
            points.splice(idx, 1);
            cleanupOrphans(); 
        }

        function deleteStick(stick) { 
            let idx = sticks.indexOf(stick); 
            if (idx !== -1) {
                sticks.splice(idx, 1); 
                cleanupOrphans(); 
            } 
        }

        function buildAngleConstraints() {
            angleConstraints = [];
            for (let node of points) {
                if (node.broken) continue;
                let neighbors = [];
                for (let s of sticks) {
                    if (s.broken) continue;
                    let other = s.p1 === node ? s.p2 : (s.p2 === node ? s.p1 : null);
                    if (!other || other.broken) continue;
                    let dx = other.x - node.x, dy = other.y - node.y, len = Math.hypot(dx, dy);
                    if (len > 0.01) neighbors.push({ point: other, stick: s, initDirX: dx/len, initDirY: dy/len });
                }
                if (neighbors.length >= 2) angleConstraints.push({ node, neighbors });
            }
        }

        function applyAngleConstraints(iterations) {
            for (let iter = 0; iter < iterations; iter++) {
                for (let c of angleConstraints) {
                    let node = c.node; if (node.broken) continue;
                    let validNeighbors = c.neighbors.filter(nb => !nb.stick.broken && !nb.point.broken);
                    if (validNeighbors.length < 2) continue;
                    for (let nb of validNeighbors) {
                        let p = nb.point; if (node.pinned && p.pinned) continue;
                        let dist = Math.hypot(p.x - node.x, p.y - node.y);
                        if (dist < 0.01) continue;
                        let moveX = (node.x + nb.initDirX * dist - p.x) * CONFIG.angleStiffness;
                        let moveY = (node.y + nb.initDirY * dist - p.y) * CONFIG.angleStiffness;
                        if (!node.pinned && !p.pinned) { p.x += moveX; p.y += moveY; node.x -= moveX; node.y -= moveY; }
                        else if (!p.pinned) { p.x += moveX; p.y += moveY; }
                        else if (!node.pinned) { node.x -= moveX; node.y -= moveY; }
                    }
                }
            }
        }

        function checkAngleBreaks() {
            let newBroken = false;
            for (let c of angleConstraints) {
                let node = c.node; if (node.broken) continue;
                let validNeighbors = c.neighbors.filter(nb => !nb.stick.broken && !nb.point.broken);
                if (validNeighbors.length < 2) continue;
                
                let maxAngleDiff = 0;
                for (let i = 0; i < validNeighbors.length; i++) {
                    for (let j = i+1; j < validNeighbors.length; j++) {
                        let a = validNeighbors[i], b = validNeighbors[j];
                        let curAngle = Math.atan2((a.point.x-node.x)*(b.point.y-node.y) - (a.point.y-node.y)*(b.point.x-node.x), (a.point.x-node.x)*(b.point.x-node.x) + (a.point.y-node.y)*(b.point.y-node.y));
                        let initAngle = Math.atan2(a.initDirX*b.initDirY - a.initDirY*b.initDirX, a.initDirX*b.initDirX + a.initDirY*b.initDirY);
                        let diff = Math.abs(curAngle - initAngle); if (diff > Math.PI) diff = 2*Math.PI - diff;
                        if (diff > maxAngleDiff) maxAngleDiff = diff;
                    }
                }
                
                const angleLimit = node.mat.angleStrength;
                const effectiveAngleDiff = maxAngleDiff * CONFIG.testSeverityMultiplier;
                if (effectiveAngleDiff > angleLimit && !node.broken && !node.isGhost) {
                    newBroken = true;
                    c.node.pinned = false;

                    if (effectiveAngleDiff > angleLimit * 1.22) {
                        node.shatter();
                        continue;
                    }

                    sticks.forEach(s => {
                        if (!s.broken && (s.p1 === node || s.p2 === node)) s.frameStress += 24;
                    });
                }
            }
            if (newBroken) angleConstraints = angleConstraints.filter(c => !c.node.broken && !c.node.isGhost);
        }

        function loop() {
            let constraintIters = isSimulating ? 25 : 1; 

            if (isSimulating && preheatRemaining > 0) preheatRemaining--;

            if (envActive) {
                envRampUp = Math.min(1, envRampUp + 1 / ENV_RAMP_FRAMES);
            } else {
                envRampUp = 0;
            }

            if (isSimulating) {
                points.forEach(p => {
                    if (!p.broken && !p.isGhost && !p.pinned) {
                        let hasActiveStick = sticks.some(s => !s.broken && (s.p1 === p || s.p2 === p));
                        if (!hasActiveStick) p.shatter();
                    }
                });
            }

            points.forEach(p => p.mass = p.baseMass);
            sticks.forEach(s => {
                s.frameStress = 0;
                if (!s.broken && !s.p1.isGhost && !s.p2.isGhost) {
                    let m = s.len * s.mat.density;
                    s.p1.mass += m / 2;
                    s.p2.mass += m / 2;
                }
            });

            points.forEach(p => p.applyForces());

            for (let k = 0; k < constraintIters; k++) {
                sticks.forEach(s => s.resolve());
                welds.forEach(w => w.resolve());
                if (isSimulating && angleConstraints.length > 0) applyAngleConstraints(1);
                points.forEach(p => p.applyConstraints());
            }

            if (isSimulating) {
                if (angleConstraints.length > 0) checkAngleBreaks();
                sticks.forEach(s => {
                    s.stress = s.stress * CONFIG.stressSmoothing + s.frameStress * (1 - CONFIG.stressSmoothing);
                    s.checkBreakage();
                });
            }

            for (let i = debrisList.length - 1; i >= 0; i--) {
                debrisList[i].update();
                if (debrisList[i].life <= 0) debrisList.splice(i, 1);
            }

            ctx.clearRect(0, 0, width, height);
            drawGrid();
            ctx.fillStyle = "#95a5a6";
            ctx.fillRect(0, groundY, width, CONFIG.groundHeight);

            sticks.forEach(s => s.draw());

            points.forEach(p => {
                if (isSimulating && p.broken) return; 
                if (p.isGhost) return; 
                
                if (showBreakMarkers && p.wasBroken && p.breakOrder > 0 && p.breakOrder <= MAX_BREAKS_TO_HIGHLIGHT) {
                    ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2); ctx.strokeStyle = '#ff0000'; ctx.lineWidth = 3; ctx.stroke();
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fillStyle = p.mat.color; ctx.fill();
                    return;
                }
                if (!isSimulating && p.broken) { 
                    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fillStyle = p.mat.color; ctx.globalAlpha=0.5; ctx.fill(); ctx.globalAlpha=1.0; 
                    return; 
                }
                
                ctx.beginPath(); ctx.arc(p.x, p.y, p.pinned ? 8 : 5, 0, Math.PI*2);
                ctx.fillStyle = p.pinned ? "#34495e" : p.mat.color; ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 1; ctx.stroke();
            });

            debrisList.forEach(d => d.draw());

            if (deleteMode && !isSimulating) {
                hoveredStick = null; let stickDist = 10;
                for (let s of sticks) {
                    let d = distanceToSegment(mouse, s.p1, s.p2);
                    if (d < stickDist) { stickDist = d; hoveredStick = s; }
                }
                if (hoveredStick) {
                    ctx.beginPath(); ctx.moveTo(hoveredStick.p1.x, hoveredStick.p1.y); ctx.lineTo(hoveredStick.p2.x, hoveredStick.p2.y);
                    ctx.strokeStyle = '#e67e22'; ctx.lineWidth = 8; ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);
                }
            }
            if (!isSimulating) drawInteraction();

            updateStats();
            requestAnimationFrame(loop);
        }

        function distanceToSegment(p, a, b) {
            let abx = b.x - a.x, aby = b.y - a.y, apx = p.x - a.x, apy = p.y - a.y, ab2 = abx*abx + aby*aby;
            if (ab2 === 0) return Math.hypot(p.x - a.x, p.y - a.y);
            let t = Math.max(0, Math.min(1, (apx*abx + apy*aby) / ab2));
            return Math.hypot(p.x - (a.x + abx * t), p.y - (a.y + aby * t));
        }

        function drawGrid() {
            ctx.strokeStyle = "rgba(0,0,0,0.06)"; ctx.lineWidth = 1;
            for(let x=0; x<width; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,height); ctx.stroke(); }
            for(let y=height; y>0; y-=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(width,y); ctx.stroke(); }

            const targetY = groundY - 10 * CONFIG.scale;
            ctx.save();
            ctx.strokeStyle = "rgba(231,76,60,0.85)";
            ctx.lineWidth = 2.5;
            ctx.setLineDash([14, 7]);
            ctx.beginPath(); ctx.moveTo(0, targetY); ctx.lineTo(width, targetY); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = "rgba(231,76,60,0.9)";
            ctx.font = "bold 13px 'Segoe UI', 'Microsoft YaHei', sans-serif";
            ctx.fillText("── 10 m 线 ──", 10, targetY - 6);
            ctx.restore();
        }

        function drawInteraction() {
            hoveredPoint = null; hoveredWeldPos = null; 
            let minDist = CONFIG.snapDist;
            
            for (let p of points) {
                if (p.broken || p.isGhost) continue;
                let d = Math.hypot(p.x - mouse.x, p.y - mouse.y);
                if (d < minDist) { minDist = d; hoveredPoint = p; }
            }

            if (!hoveredPoint && !deleteMode) {
                let stickDist = CONFIG.snapDist;
                for (let s of sticks) {
                    let abx = s.p2.x - s.p1.x, aby = s.p2.y - s.p1.y;
                    let apx = mouse.x - s.p1.x, apy = mouse.y - s.p1.y;
                    let ab2 = abx*abx + aby*aby;
                    if (ab2 === 0) continue;
                    let t = Math.max(0, Math.min(1, (apx*abx + apy*aby) / ab2));
                    let px = s.p1.x + abx * t;
                    let py = s.p1.y + aby * t;
                    let d = Math.hypot(mouse.x - px, mouse.y - py);
                    if (d < stickDist && t > 0.05 && t < 0.95) { 
                        stickDist = d; 
                        hoveredWeldPos = { x: px, y: py, stick: s, t: t }; 
                    }
                }
            }

            if (deleteMode) {
                canvas.style.cursor = "cell";
                if (hoveredPoint) {
                    ctx.beginPath(); ctx.arc(hoveredPoint.x, hoveredPoint.y, 12, 0, Math.PI*2);
                    ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 3; ctx.setLineDash([2,2]); ctx.stroke(); ctx.setLineDash([]);
                }
            } else {
                if (hoveredPoint) {
                    ctx.beginPath(); ctx.arc(hoveredPoint.x, hoveredPoint.y, 12, 0, Math.PI*2);
                    ctx.strokeStyle = MATERIALS[currentMat].color; ctx.lineWidth = 2; ctx.setLineDash([2,2]); ctx.stroke(); ctx.setLineDash([]);
                    canvas.style.cursor = "pointer";
                } else if (hoveredWeldPos) {
                    ctx.beginPath(); ctx.arc(hoveredWeldPos.x, hoveredWeldPos.y, 6, 0, Math.PI*2);
                    ctx.fillStyle = MATERIALS[currentMat].color; ctx.fill();
                    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
                    canvas.style.cursor = "crosshair";
                } else if (mouse.y >= groundY - 10) canvas.style.cursor = "cell"; else canvas.style.cursor = "default";
            }

            if (isDragging && dragStart && !deleteMode) {
                let targetX = hoveredPoint ? hoveredPoint.x : (hoveredWeldPos ? hoveredWeldPos.x : mouse.x);
                let targetY = hoveredPoint ? hoveredPoint.y : (hoveredWeldPos ? hoveredWeldPos.y : mouse.y);
                let dist = Math.hypot(targetX - dragStart.x, targetY - dragStart.y), segments = Math.ceil(dist / CONFIG.maxStickLen);
                ctx.beginPath(); ctx.moveTo(dragStart.x, dragStart.y); ctx.lineTo(targetX, targetY);
                ctx.strokeStyle = MATERIALS[currentMat].color; ctx.lineWidth = 3; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
                if (segments > 1) { ctx.fillStyle = "#e67e22"; ctx.font = "12px Arial"; ctx.fillText(`${segments}段连接`, mouse.x + 10, mouse.y); }
            }
        }

        canvas.addEventListener('mousemove', e => { const rect = canvas.getBoundingClientRect(); mouse.x = e.clientX - rect.left; mouse.y = e.clientY - rect.top; });
        
        canvas.addEventListener('mousedown', e => {
            if (isSimulating) { showToast("⚠️ 测试中无法修改，请先停止！"); return; }
            if (e.button === 2) return;
            if (deleteMode) {
                if (hoveredPoint) { deletePoint(hoveredPoint); saveHistory(); showToast("删除节点"); } 
                else if (hoveredStick) { deleteStick(hoveredStick); saveHistory(); showToast("删除杆件"); }
                return;
            }
            if (hoveredPoint) { 
                dragStart = hoveredPoint; isDragging = true; 
            } 
            else if (hoveredWeldPos) {
                dragStart = { x: hoveredWeldPos.x, y: hoveredWeldPos.y, isWeldIntent: true, weldPos: hoveredWeldPos };
                isDragging = true;
            }
            else if (mouse.y > groundY - 15) {
                dragStart = { x: mouse.x, y: groundY, isGroundIntent: true };
                isDragging = true;
            }
        });

        canvas.addEventListener('mouseup', e => {
            if (isSimulating || deleteMode || !isDragging || !dragStart) return;
            
            let endP = hoveredPoint;
            let weldTarget = null;

            if (!endP && hoveredWeldPos) {
                let dist = Math.hypot(hoveredWeldPos.x - dragStart.x, hoveredWeldPos.y - dragStart.y);
                if (dist > 5) {
                    endP = addPoint(hoveredWeldPos.x, hoveredWeldPos.y, false, currentMat);
                    weldTarget = hoveredWeldPos;
                }
            }

            let finalX = endP ? endP.x : mouse.x, finalY = endP ? endP.y : mouse.y;
            if (!endP && finalY > groundY) finalY = groundY;
            let dx = finalX - dragStart.x, dy = finalY - dragStart.y, dist = Math.hypot(dx, dy);

            if (dist > 5) {
                // 起点：按需创建（焊接节点 / 地基节点 / 普通节点）
                let actualStart;
                if (dragStart.isWeldIntent) {
                    actualStart = addPoint(dragStart.x, dragStart.y, false, currentMat);
                    welds.push(new WeldConstraint(actualStart, dragStart.weldPos.stick, dragStart.weldPos.t));
                } else if (dragStart.isGroundIntent) {
                    actualStart = addPoint(dragStart.x, dragStart.y, true, currentMat);
                } else {
                    actualStart = dragStart;
                }

                if (weldTarget && endP) {
                    welds.push(new WeldConstraint(endP, weldTarget.stick, weldTarget.t));
                }

                let segments = Math.ceil(dist / CONFIG.maxStickLen), currentStart = actualStart;
                for (let i = 1; i <= segments; i++) {
                    let isLast = (i === segments), nextP;
                    if (isLast && endP) nextP = endP;
                    else {
                        let ny = dragStart.y + dy * (i/segments), pin = (isLast && ny >= groundY - 1);
                        if (pin) ny = groundY;
                        nextP = addPoint(dragStart.x + dx * (i/segments), ny, pin, currentMat);
                    }
                    if (currentStart !== nextP && !sticks.some(s => (s.p1 === currentStart && s.p2 === nextP) || (s.p1 === nextP && s.p2 === currentStart))) sticks.push(new Stick(currentStart, nextP, currentMat));
                    currentStart = nextP;
                }
                saveHistory(); // 操作完成后再保存，确保每次撤销只退一步
            }
            isDragging = false; dragStart = null;
        });

        canvas.addEventListener('contextmenu', e => {
            e.preventDefault();
            if (!isSimulating && !deleteMode && hoveredPoint) { deletePoint(hoveredPoint); saveHistory(); showToast("删除节点"); }
        });

        // ===== 触屏支持 =====
        // 触屏设备适当放大捕捉半径，便于手指操作
        const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
        if (isTouchDevice) CONFIG.snapDist = 24;

        function getTouchCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const t = e.changedTouches[0];
            return { x: t.clientX - rect.left, y: t.clientY - rect.top };
        }

        function recalcHoverFromMouse() {
            hoveredPoint = null;
            let minDist = CONFIG.snapDist;
            for (let p of points) {
                if (p.broken || p.isGhost) continue;
                let d = Math.hypot(p.x - mouse.x, p.y - mouse.y);
                if (d < minDist) { minDist = d; hoveredPoint = p; }
            }
            hoveredWeldPos = null;
            if (!hoveredPoint && !deleteMode) {
                let stickDist = CONFIG.snapDist;
                for (let s of sticks) {
                    let abx = s.p2.x - s.p1.x, aby = s.p2.y - s.p1.y;
                    let apx = mouse.x - s.p1.x, apy = mouse.y - s.p1.y;
                    let ab2 = abx*abx + aby*aby;
                    if (ab2 === 0) continue;
                    let tt = Math.max(0, Math.min(1, (apx*abx + apy*aby) / ab2));
                    let px = s.p1.x + abx * tt, py = s.p1.y + aby * tt;
                    let d = Math.hypot(mouse.x - px, mouse.y - py);
                    if (d < stickDist && tt > 0.05 && tt < 0.95) { stickDist = d; hoveredWeldPos = { x: px, y: py, stick: s, t: tt }; }
                }
            }
            hoveredStick = null;
            if (deleteMode) {
                let sd = 18;
                for (let s of sticks) { let d = distanceToSegment(mouse, s.p1, s.p2); if (d < sd) { sd = d; hoveredStick = s; } }
            }
        }

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const pos = getTouchCanvasPos(e);
            mouse.x = pos.x; mouse.y = pos.y;
            recalcHoverFromMouse();
            if (isSimulating) { showToast("⚠️ 测试中无法修改，请先停止！"); return; }
            if (deleteMode) {
                if (hoveredPoint) { deletePoint(hoveredPoint); saveHistory(); showToast("删除节点"); }
                else if (hoveredStick) { deleteStick(hoveredStick); saveHistory(); showToast("删除杆件"); }
                return;
            }
            if (hoveredPoint) { dragStart = hoveredPoint; isDragging = true; }
            else if (hoveredWeldPos) { dragStart = { x: hoveredWeldPos.x, y: hoveredWeldPos.y, isWeldIntent: true, weldPos: hoveredWeldPos }; isDragging = true; }
            else if (mouse.y > groundY - 15) { dragStart = { x: mouse.x, y: groundY, isGroundIntent: true }; isDragging = true; }
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const pos = getTouchCanvasPos(e);
            mouse.x = pos.x; mouse.y = pos.y;
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            const pos = getTouchCanvasPos(e);
            mouse.x = pos.x; mouse.y = pos.y;
            recalcHoverFromMouse();
            if (isSimulating || deleteMode || !isDragging || !dragStart) { isDragging = false; dragStart = null; return; }

            let endP = hoveredPoint;
            let weldTarget = null;
            if (!endP && hoveredWeldPos) {
                let dist = Math.hypot(hoveredWeldPos.x - dragStart.x, hoveredWeldPos.y - dragStart.y);
                if (dist > 5) { endP = addPoint(hoveredWeldPos.x, hoveredWeldPos.y, false, currentMat); weldTarget = hoveredWeldPos; }
            }
            let finalX = endP ? endP.x : mouse.x, finalY = endP ? endP.y : mouse.y;
            if (!endP && finalY > groundY) finalY = groundY;
            let dx = finalX - dragStart.x, dy = finalY - dragStart.y, dist = Math.hypot(dx, dy);
            if (dist > 5) {
                let actualStart;
                if (dragStart.isWeldIntent) {
                    actualStart = addPoint(dragStart.x, dragStart.y, false, currentMat);
                    welds.push(new WeldConstraint(actualStart, dragStart.weldPos.stick, dragStart.weldPos.t));
                } else if (dragStart.isGroundIntent) {
                    actualStart = addPoint(dragStart.x, dragStart.y, true, currentMat);
                } else {
                    actualStart = dragStart;
                }
                if (weldTarget && endP) welds.push(new WeldConstraint(endP, weldTarget.stick, weldTarget.t));
                let segments = Math.ceil(dist / CONFIG.maxStickLen), currentStart = actualStart;
                for (let i = 1; i <= segments; i++) {
                    let isLast = (i === segments), nextP;
                    if (isLast && endP) nextP = endP;
                    else {
                        let ny = dragStart.y + dy * (i/segments), pin = (isLast && ny >= groundY - 1);
                        if (pin) ny = groundY;
                        nextP = addPoint(dragStart.x + dx * (i/segments), ny, pin, currentMat);
                    }
                    if (currentStart !== nextP && !sticks.some(s => (s.p1 === currentStart && s.p2 === nextP) || (s.p1 === nextP && s.p2 === currentStart))) sticks.push(new Stick(currentStart, nextP, currentMat));
                    currentStart = nextP;
                }
                saveHistory();
            }
            isDragging = false; dragStart = null;
        }, { passive: false });

        canvas.addEventListener('touchcancel', e => {
            e.preventDefault();
            isDragging = false;
            dragStart = null;
            hoveredPoint = null;
            hoveredStick = null;
            hoveredWeldPos = null;
        }, { passive: false });

        window.toggleMobileSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            document.getElementById('mobile-sidebar-toggle').innerText = sidebar.classList.contains('collapsed') ? '☰' : '✕';
        };

        function saveBlueprint() {
            blueprint = { 
                points: points.map(p => ({ x: p.x, y: p.y, pinned: p.pinned, matId: p.mat.id })), 
                sticks: sticks.map(s => ({ p1_idx: points.indexOf(s.p1), p2_idx: points.indexOf(s.p2), matId: s.mat.id })),
                welds: welds.map(w => ({ pIdx: points.indexOf(w.point), sIdx: sticks.indexOf(w.stick), t: w.t }))
            };
        }
        function restoreBlueprint() {
            if (!blueprint) return;
            let oldBrokenInfo = points.map(p => ({ wasBroken: p.wasBroken, breakOrder: p.breakOrder }));
            let oldStickBroken = sticks.map(s => ({ wasBroken: s.wasBroken, breakOrder: s.breakOrder }));
            points = []; sticks = []; welds = [];
            blueprint.points.forEach(bp => addPoint(bp.x, bp.y, bp.pinned, bp.matId));
            blueprint.sticks.forEach(bs => { if (points[bs.p1_idx] && points[bs.p2_idx]) sticks.push(new Stick(points[bs.p1_idx], points[bs.p2_idx], bs.matId)); });
            if (blueprint.welds) {
                blueprint.welds.forEach(bw => { if (points[bw.pIdx] && sticks[bw.sIdx]) welds.push(new WeldConstraint(points[bw.pIdx], sticks[bw.sIdx], bw.t)); });
            }
            for (let i = 0; i < points.length && i < oldBrokenInfo.length; i++) { points[i].wasBroken = oldBrokenInfo[i].wasBroken; points[i].breakOrder = oldBrokenInfo[i].breakOrder; }
            for (let i = 0; i < sticks.length && i < oldStickBroken.length; i++) { sticks[i].wasBroken = oldStickBroken[i].wasBroken; sticks[i].breakOrder = oldStickBroken[i].breakOrder; }
        }

        window.setMaterial = (matId) => {
            currentMat = matId;
            document.querySelectorAll('.mat-option').forEach(el => el.classList.remove('active'));
            document.getElementById('mat-' + matId).classList.add('active');
            showToast(`切换为：${MATERIALS[matId].name}`);
        };
        window.updateEnv = (type, val) => {
            env[type] = parseFloat(val);
            let display = `${env[type].toFixed(1)}级`;
            document.getElementById(`val-${type}`).innerText = display;
        };
        window.toggleSimulation = () => {
            const btn = document.getElementById('btn-mode');
            const sliders = document.querySelectorAll('input[type=range]');
            const applyBtn = document.getElementById('btn-apply-test');
            if (!isSimulating) {
                points.forEach(p => { p.wasBroken = false; p.breakOrder = 0; p.broken = false; });
                sticks.forEach(s => { s.wasBroken = false; s.breakOrder = 0; s.broken = false; });
                saveBlueprint(); nextBreakOrder = 1; debrisList = [];
                buildAngleConstraints();
                isSimulating = true; preheatRemaining = 20;
                showBreakMarkers = false;
                btn.innerHTML = "🔄 恢复原状"; btn.classList.add('testing');
                sliders.forEach(s => s.disabled = false);
                applyBtn.disabled = false;
                showToast("测试开始，结构自适应中...");
            } else {
                if (applyTestTimer) { clearInterval(applyTestTimer); applyTestTimer = null; }
                isSimulating = false; preheatRemaining = 0; angleConstraints = []; envActive = false;
                btn.innerHTML = "▶️ 开始测试"; btn.classList.remove('testing');
                sliders.forEach(s => { s.disabled = true; });
                applyBtn.innerHTML = "⚡ 应用测试 <span id='apply-countdown'></span>";
                applyBtn.disabled = true;
                restoreBlueprint(); debrisList = [];
                showBreakMarkers = true;
                showToast("场景已复原，红色标注最先断裂部件");
            }
        };
        let applyTestTimer = null;
        window.applyTest = () => {
            if (!isSimulating) return;
            const applyBtn = document.getElementById('btn-apply-test');
            if (applyTestTimer) {
                clearInterval(applyTestTimer); applyTestTimer = null;
                envActive = false;
                document.querySelectorAll('input[type=range]').forEach(s => s.disabled = false);
                applyBtn.innerHTML = "⚡ 应用测试 <span id='apply-countdown'></span>";
                applyBtn.disabled = false;
                showToast("⏹️ 已停止环境扰动，物理模拟继续");
            } else {
                envActive = true;
                document.querySelectorAll('input[type=range]').forEach(s => s.disabled = true);
                let remaining = 5;
                applyBtn.innerHTML = `⏹️ 停止测试 <span id='apply-countdown'>(${remaining}s)</span>`;
                applyTestTimer = setInterval(() => {
                    remaining--;
                    const cd = document.getElementById('apply-countdown');
                    if (remaining > 0) {
                        if (cd) cd.innerText = `(${remaining}s)`;
                    } else {
                        clearInterval(applyTestTimer); applyTestTimer = null;
                        envActive = false;
                        document.querySelectorAll('input[type=range]').forEach(s => s.disabled = false);
                        applyBtn.innerHTML = "⚡ 应用测试 <span id='apply-countdown'></span>";
                        applyBtn.disabled = false;
                        showToast("✅ 应用测试完成");
                    }
                }, 1000);
                showToast("⚡ 应用测试进行中，5秒后解锁...");
            }
        };
        window.clearAll = () => { if (isSimulating) { showToast("测试中不能清空，请先停止！"); return; } if (!isSimulating && confirm("确定要清空吗？")) { points = []; sticks = []; welds = []; init(); blueprint = null; nextBreakOrder = 1; debrisList=[]; saveHistory(); showToast("已清空"); } };
        window.undo = undo; window.toggleDeleteMode = toggleDeleteMode;
        function showToast(msg) { let t = document.getElementById('toast'); if (t) { t.innerText = msg; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 2000); } }

        function updateStats() {
            const connected = new Set();
            points.forEach(p => { if (p.pinned && !p.broken && !p.isGhost) connected.add(p); });
            let changed = true;
            while (changed) {
                changed = false;
                sticks.forEach(s => {
                    if (s.broken) return;
                    if (connected.has(s.p1) && !s.p2.broken && !s.p2.isGhost && !connected.has(s.p2)) { connected.add(s.p2); changed = true; }
                    if (connected.has(s.p2) && !s.p1.broken && !s.p1.isGhost && !connected.has(s.p1)) { connected.add(s.p1); changed = true; }
                });
            }
            let maxH = 0;
            connected.forEach(p => { maxH = Math.max(maxH, groundY - p.y); });
            const mH = Math.round(maxH / CONFIG.scale * 10) / 10;
            const hdVal = document.getElementById('hd-value');
            if (hdVal) { hdVal.innerText = mH; hdVal.style.color = mH >= 10 ? '#2ecc71' : '#f1c40f'; }

            if (isSimulating) return;

            let nodeCountPinned = 0, nodeCountWood = 0, nodeCountSteel = 0, nodeCountCarbon = 0;
            points.filter(p=>!p.broken && !p.isGhost).forEach(p => {
                if (p.pinned) nodeCountPinned++;
                else if (p.mat.id === 'wood') nodeCountWood++;
                else if (p.mat.id === 'steel') nodeCountSteel++;
                else nodeCountCarbon++;
            });
            document.getElementById('stat-nodes-pinned').innerText = nodeCountPinned;
            document.getElementById('stat-nodes-wood').innerText   = nodeCountWood;
            document.getElementById('stat-nodes-steel').innerText  = nodeCountSteel;
            document.getElementById('stat-nodes-carbon').innerText = nodeCountCarbon;

            let lenW = 0, lenS = 0, lenC = 0;
            sticks.forEach(s => {
                if (!s.broken && !s.p1.broken && !s.p2.broken) {
                    let l = s.len / CONFIG.scale;
                    if (s.mat.id === 'wood') lenW += l; else if (s.mat.id === 'steel') lenS += l; else lenC += l;
                }
            });
            lenW = Math.round(lenW * 10) / 10;
            lenS = Math.round(lenS * 10) / 10;
            lenC = Math.round(lenC * 10) / 10;
            document.getElementById('stat-len-wood').innerText = lenW;
            document.getElementById('stat-len-steel').innerText = lenS;
            document.getElementById('stat-len-carbon').innerText = lenC;

            const costNodesPinned = nodeCountPinned * 500;
            const costNodesWood   = nodeCountWood   * 20;
            const costNodesSteel  = nodeCountSteel  * 60;
            const costNodesCarbon = nodeCountCarbon * 160;
            const costWood   = Math.round(lenW * 40);
            const costSteel  = Math.round(lenS * 160);
            const costCarbon = Math.round(lenC * 400);
            const total = costNodesPinned + costNodesWood + costNodesSteel + costNodesCarbon + costWood + costSteel + costCarbon;

            document.getElementById('stat-cost-nodes-pinned').innerText = costNodesPinned.toLocaleString();
            document.getElementById('stat-cost-nodes-wood').innerText   = costNodesWood.toLocaleString();
            document.getElementById('stat-cost-nodes-steel').innerText  = costNodesSteel.toLocaleString();
            document.getElementById('stat-cost-nodes-carbon').innerText = costNodesCarbon.toLocaleString();
            document.getElementById('stat-cost-wood').innerText   = costWood.toLocaleString();
            document.getElementById('stat-cost-steel').innerText  = costSteel.toLocaleString();
            document.getElementById('stat-cost-carbon').innerText = costCarbon.toLocaleString();
            document.getElementById('stat-cost').innerText        = total.toLocaleString();

            const evalEl = document.getElementById('cost-eval');
            if (total === 0) {
                evalEl.style.display = 'none';
            } else {
                evalEl.style.display = 'block';
                if (total < 10000) {
                    evalEl.style.borderLeftColor = '#2ecc71';
                    evalEl.style.background = '#f0fff4';
                    evalEl.innerHTML = '💰 <strong>抠门大师</strong><br>成本控制得出神入化，没准会有奖金！就是……不知道性能怎么样？';
                } else if (total <= 20000) {
                    evalEl.style.borderLeftColor = '#f39c12';
                    evalEl.style.background = '#fffbf0';
                    evalEl.innerHTML = '🏗️ <strong>合格工程师</strong><br>不贵不便宜，刚好卡在预算里——我想这次领导会满意了。';
                } else {
                    evalEl.style.borderLeftColor = '#e74c3c';
                    evalEl.style.background = '#fff5f5';
                    evalEl.innerHTML = '🚀 <strong>烧钱狂魔</strong><br>你到底在造什么，是打算上太空吗？甲方已经在查你的银行流水了……';
                }
            }
        }
        function replaceSlidersWithDivs() {
            const replacements = [];
            document.querySelectorAll('input[type=range]').forEach(function(input) {
                const min = parseFloat(input.min) || 0;
                const max = parseFloat(input.max) || 100;
                const val = parseFloat(input.value) || 0;
                const pct = ((val - min) / (max - min)) * 100;
                const isDisabled = input.disabled;

                const trackColor = isDisabled ? '#ddd' : '#bdc3c7';
                const fillColor  = isDisabled ? '#bdc3c7' : '#3498db';
                const thumbColor = isDisabled ? '#ccc'    : '#2980b9';

                const proxy = document.createElement('div');
                proxy.style.cssText = `
                    position:relative; width:100%; height:20px;
                    display:flex; align-items:center; box-sizing:border-box;
                    cursor:${isDisabled ? 'not-allowed' : 'pointer'};
                `;

                const track = document.createElement('div');
                track.style.cssText = `
                    position:absolute; left:0; right:0; height:4px;
                    border-radius:2px; background:${trackColor};
                `;

                const fill = document.createElement('div');
                fill.style.cssText = `
                    position:absolute; left:0; width:${pct}%; height:4px;
                    border-radius:2px; background:${fillColor};
                `;

                const thumb = document.createElement('div');
                thumb.style.cssText = `
                    position:absolute; left:calc(${pct}% - 7px);
                    width:14px; height:14px; border-radius:50%;
                    background:${thumbColor}; border:2px solid white;
                    box-shadow:0 1px 4px rgba(0,0,0,0.25);
                    box-sizing:border-box;
                `;

                proxy.appendChild(track);
                proxy.appendChild(fill);
                proxy.appendChild(thumb);

                input.parentNode.insertBefore(proxy, input);
                input.style.display = 'none';
                replacements.push({ input, proxy });
            });
            return replacements;
        }

        function restoreSliders(replacements) {
            replacements.forEach(function(r) {
                r.input.style.display = '';
                r.proxy.parentNode.removeChild(r.proxy);
            });
        }

        window.exportCanvasImage = function() {
            showToast('📷 正在截图，请稍候...');

            function doCapture() {
                const replacements = replaceSlidersWithDivs();

                html2canvas(document.body, {
                    useCORS: true,
                    allowTaint: true,
                    scale: window.devicePixelRatio || 1,
                    width: document.body.scrollWidth,
                    height: document.body.scrollHeight,
                    windowWidth: document.body.scrollWidth,
                    windowHeight: document.body.scrollHeight,
                    backgroundColor: '#f0f2f5'
                }).then(function(exportCanvas) {
                    restoreSliders(replacements);
                    const now = new Date();
                    const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
                    const link = document.createElement('a');
                    link.download = `塔台全界面_${ts}.png`;
                    link.href = exportCanvas.toDataURL('image/png');
                    link.click();
                    showToast('✅ 全界面图片已导出！');
                }).catch(function() {
                    restoreSliders(replacements);
                    showToast('❌ 截图失败，请重试');
                });
            }

            if (window.html2canvas) {
                doCapture();
            } else {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                script.onload = doCapture;
                script.onerror = function() { showToast('❌ 截图库加载失败，请检查网络'); };
                document.head.appendChild(script);
            }
        };

        init();
    })();
</script>
